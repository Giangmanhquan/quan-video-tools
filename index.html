<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Quan Video Tools</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #020617,
                    #0f172a,
                    #1e293b
                );
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:760px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);
            border-radius:28px;
            padding:40px;
            text-align:center;
            box-shadow:0 0 45px rgba(0,0,0,0.35);
            backdrop-filter:blur(12px);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        .sub{
            color:#94a3b8;
            margin-bottom:30px;
            line-height:1.6;
        }

        .upload-box{
            border:2px dashed rgba(255,255,255,0.25);
            border-radius:22px;
            padding:35px 20px;
            margin-bottom:25px;
            background:rgba(15,23,42,0.75);
        }

        input[type="file"]{
            width:100%;
            padding:16px;
            background:#020617;
            color:white;
            border-radius:14px;
            border:1px solid rgba(255,255,255,0.15);
        }

        .tool-buttons{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            margin-top:20px;
        }

        button{
            padding:17px;
            border:none;
            border-radius:16px;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.25s;
        }

        button:hover{
            transform:scale(1.03);
        }

        .mp3-btn{
            background:#9333ea;
        }

        .compress-btn{
            background:#16a34a;
        }

        .result{
            margin-top:28px;
        }

        .loading{
            color:#60a5fa;
            font-size:18px;
        }

        .error{
            color:#f87171;
            font-size:17px;
        }

        .success-card{
            background:rgba(255,255,255,0.07);
            border-radius:20px;
            padding:25px;
            margin-top:25px;
        }

        .download-btn{
            display:block;
            width:100%;
            margin-top:18px;
            padding:16px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:15px;
            font-weight:bold;
            transition:0.25s;
        }

        .download-btn:hover{
            background:#1d4ed8;
            transform:scale(1.02);
        }

        .note{
            margin-top:25px;
            color:#94a3b8;
            font-size:14px;
            line-height:1.6;
        }

        @media(max-width:700px){
            .container{
                padding:28px 20px;
            }

            h1{
                font-size:32px;
            }

            .tool-buttons{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Quan Video Tools</h1>

        <p class="sub">
            Upload video để chuyển sang MP3 hoặc nén video online.
        </p>

        <div class="upload-box">

            <input
                type="file"
                id="videoFile"
                accept="video/*"
            >

            <div class="tool-buttons">

                <button
                    class="mp3-btn"
                    onclick="processVideo('mp3')"
                >
                    Chuyển sang MP3
                </button>

                <button
                    class="compress-btn"
                    onclick="processVideo('compress')"
                >
                    Nén Video
                </button>

            </div>

        </div>

        <div
            id="result"
            class="result"
        ></div>

        <p class="note">
            Lưu ý: Video càng dài thì xử lý càng lâu. File sau khi tải sẽ được server tự xóa.
        </p>

    </div>

    <script>
        async function processVideo(type){

            const fileInput =
                document.getElementById("videoFile");

            const result =
                document.getElementById("result");

            const file =
                fileInput.files[0];

            if(!file){
                result.innerHTML =
                    `<p class="error">
                        Vui lòng chọn video trước.
                    </p>`;

                return;
            }

            const formData =
                new FormData();

            formData.append(
                "video",
                file
            );

            let apiUrl = "";

            let loadingText = "";

            if(type === "mp3"){
                apiUrl = "/convert-mp3";
                loadingText =
                    "Đang chuyển video sang MP3...";
            }

            if(type === "compress"){
                apiUrl = "/compress-video";
                loadingText =
                    "Đang nén video...";
            }

            result.innerHTML =
                `<p class="loading">
                    ${loadingText}
                </p>`;

            try{
                const response =
                    await fetch(
                        apiUrl,
                        {
                            method:"POST",
                            body: formData
                        }
                    );

                const data =
                    await response.json();

                if(data.error){
                    result.innerHTML =
                        `<p class="error">
                            ${data.error}
                        </p>`;

                    return;
                }

                result.innerHTML = `
                    <div class="success-card">

                        <h3>
                            ${data.message}
                        </h3>

                        <a
                            class="download-btn"
                            href="${data.downloadUrl}"
                        >
                            Tải file xuống
                        </a>

                    </div>
                `;

            }catch(error){
                result.innerHTML =
                    `<p class="error">
                        Có lỗi xảy ra khi xử lý video.
                    </p>`;
            }
        }
    </script>

</body>
</html>
